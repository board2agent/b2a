name: Test Agent

on:
  projects_v2_item:
    types: [edited]

jobs:
  test:
    if: |
      github.event.changes.field_value.field_name == 'Status' &&
      github.event.changes.field_value.to.name == 'Testing'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Test Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the test agent for the b2a pipeline.

            Your job:
            1. Run `gh issue view ${{ github.event.projects_v2_item.content_node_id }} --json title,body,comments,labels` to read context.
            2. Check CLAUDE.md for the test command (e.g. `npm test`, `make test`, `pytest`). Run the full test suite.
            3. If all tests pass:
               - Post a comment summarising the test results.
               - Move the card to "Done":
                 ```
                 gh project item-edit \
                   --project-id PROJECT_ID \
                   --id ${{ github.event.projects_v2_item.node_id }} \
                   --field-id STATUS_FIELD_ID \
                   --single-select-option-id DONE_OPTION_ID
                 ```
                 Refer to CLAUDE.md for the correct IDs.
            4. If tests fail:
               - Post a comment with the specific test failures (include output).
               - Determine the current cycle count from existing `cycles:N` labels and add the next label:
                 ```
                 gh issue label ${{ github.event.projects_v2_item.content_node_id }} --add "cycles:N"
                 ```
               - Move the card back to "In Progress" using the In Progress option ID from CLAUDE.md.

            Do not move to Done unless the test suite passes cleanly.
