name: Review Agent

on:
  projects_v2_item:
    types: [edited]

jobs:
  review:
    if: |
      github.event.changes.field_value.field_name == 'Status' &&
      github.event.changes.field_value.to.name == 'Review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Review Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the code review agent for the b2a pipeline.

            Your job:
            1. Read this issue fully, including all comments and history.
            2. Review the code changes related to this issue against the standards in CLAUDE.md.
            3. Run the test suite (check CLAUDE.md for the test command). All tests must pass.
            4. Check for: correctness, edge cases, test coverage, code style, security issues.
            5. Run smoke tests or playwright tests if available.

            If the implementation is acceptable:
            - Post an approval comment on the issue.
            - Move the card to "Done":
              ```
              gh project item-edit \
                --project-id "${{ vars.PROJECT_ID }}" \
                --id "${{ github.event.projects_v2_item.node_id }}" \
                --field-id "${{ vars.STATUS_FIELD_ID }}" \
                --single-select-option-id "${{ vars.STATUS_DONE }}"
              ```

            If changes are required:
            - Post a detailed comment on the issue listing every specific change needed.
            - Determine the current cycle count from existing `cycles:N` labels and add the next label (e.g. if `cycles:1` exists, add `cycles:2`).
            - Move the card back to "In Progress":
              ```
              gh project item-edit \
                --project-id "${{ vars.PROJECT_ID }}" \
                --id "${{ github.event.projects_v2_item.node_id }}" \
                --field-id "${{ vars.STATUS_FIELD_ID }}" \
                --single-select-option-id "${{ vars.STATUS_IN_PROGRESS }}"
              ```

            Be specific in feedback. The implementation agent only has your comments to work from.
